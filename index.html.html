<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>おすすめ御朱印まとめ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cormorant Garamond',serif;
}

/* MENUボタン */

.menu-btn{
display:none;
}

/* PCメニュー */

.tab-menu{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:40px;
padding:20px 0;
background:rgba(255,255,255,0.95);
z-index:999;
}

.tab-menu a{
text-decoration:none;
color:#222;
font-size:16px;
letter-spacing:2px;
}

.tab-menu a:hover{
color:#c89b3c;
}

/* ファーストビュー */

.hero{

height:100vh;

background-image:url("images/hai.jpg");

background-size:cover;

background-position:center;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;
}

.hero h1{

color:white;

font-size:90px;

font-weight:300;

letter-spacing:15px;

margin:0;
}

.hero p{

color:white;

font-size:18px;

letter-spacing:8px;
}

/* 紹介 */

.intro{

background:white;

text-align:center;

padding:120px 20px;
}

.intro h2{

font-size:42px;

letter-spacing:5px;
}

.intro p{

max-width:700px;

margin:auto;

font-size:20px;

line-height:2;
}

/* おすすめ */

.recommend{

background:#f8f8f8;

padding:120px 0;

text-align:center;
}

.recommend h2{

font-size:42px;

letter-spacing:5px;

margin-bottom:60px;
}

/* Grid */

.shrine-grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:30px;

width:90%;

margin:auto;
}

.shrine-card{

background:white;

border-radius:20px;

overflow:hidden;

box-shadow:0 3px 15px rgba(0,0,0,0.1);
}

.shrine-card img{

width:100%;

height:300px;

object-fit:cover;
}

.shrine-card h3{

padding:20px;

margin:0;
}

/* フッター */

.footer{

background:#111;

color:white;

text-align:center;

padding:60px 20px;
}

.footer-logo{

width:120px;

margin-bottom:20px;
}

/* スマホ */

@media screen and (max-width:768px){

.menu-btn{

display:block;

position:fixed;

top:20px;

right:20px;

z-index:1001;

background:white;

padding:10px 15px;

border:1px solid #ddd;

font-size:14px;

letter-spacing:3px;

cursor:pointer;
}

.tab-menu{

display:none;

flex-direction:column;

align-items:center;

justify-content:flex-start;

position:fixed;

top:0;
right:0;

width:250px;
height:100vh;

background:white;

padding-top:100px;

gap:30px;

box-shadow:-5px 0 15px rgba(0,0,0,0.1);
}

.tab-menu.show{
display:flex;
}

.hero h1{

font-size:50px;

letter-spacing:5px;
}

.hero p{

font-size:12px;

letter-spacing:2px;

padding:0 20px;
}

.intro{

padding:80px 20px;
}

.intro h2{

font-size:28px;
}

.intro p{

font-size:16px;
}

.recommend{

padding:80px 20px;
}

.recommend h2{

font-size:28px;
}

.shrine-grid{

grid-template-columns:1fr;
}

.shrine-card img{

height:250px;
}

.footer-logo{

width:80px;
}

}

</style>

</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">
MENU
</div>

<nav class="tab-menu" id="menu">

<a href="goshuin.html">

</a>

<a href="history.html">
HISTORY
</a>

<a href="place.html">

</a>

<a href="about.html">
ABOUT
</a>

</nav>

<section class="hero">

<h1>
GOSHUIN
</h1>

<p>
DISCOVER JAPAN THROUGH SACRED STAMPS
</p>

</section>

<section class="intro">

<h2>
WELCOME
</h2>

<p>
御朱印は神社や寺院を参拝した証としていただくことができる特別な印です。
本サイトでは実際に訪れた神社や寺院の御朱印を紹介しています。
</p>

</section>

<section class="recommend">

<h2>
RECOMMENDED SHRINES
</h2>

<div class="shrine-grid">

<div class="shrine-card">

<img src="images/hajikami.jpg">

<h3>
波自加彌神社
</h3>

</div>

<div class="shrine-card">

<img src="images/zenkoji.jpg">

<h3>
善光寺
</h3>

</div>

<div class="shrine-card">

<img src="images/kawanakajima.jpg">

<h3>
川中島古戦場八幡社
</h3>

</div>

</div>

</section>

<footer class="footer">

<img src="images/footer-logo.png"
alt="logo"
class="footer-logo">

<p>
おすすめ御朱印まとめ
</p>

<p>
Discover Japanese Culture Through Goshuin
</p>

</footer>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("show");
}

</script>

</body>

</html>
